<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KCC Pi Kiosk — Status Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0f1923;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 0 0 32px 0;
    }

    /* ---- header ---- */
    header {
      background: #1a2a3a;
      border-bottom: 3px solid #1e5fa8;
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 {
      font-size: 1.3rem;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.03em;
    }
    header h1 span {
      color: #5b9bd5;
    }
    #last-updated {
      font-size: 0.78rem;
      color: #7a9ab8;
    }
    #refresh-countdown {
      font-size: 0.78rem;
      color: #5b9bd5;
      margin-top: 2px;
      text-align: right;
    }

    /* ---- section headings ---- */
    .section-title {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #5b9bd5;
      padding: 22px 28px 10px;
    }

    /* ---- error banner ---- */
    #error-banner {
      display: none;
      background: #5a1a1a;
      border: 1px solid #c0392b;
      color: #f5a0a0;
      margin: 16px 28px 0;
      padding: 10px 16px;
      border-radius: 4px;
      font-size: 0.85rem;
    }

    /* ================================================================
       PI GRID
    ================================================================ */
    #pi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
      padding: 0 28px;
    }

    .pi-card {
      background: #1a2535;
      border: 1px solid #253545;
      border-radius: 6px;
      padding: 12px 14px;
      position: relative;
    }
    .pi-card.all-ok   { border-left: 3px solid #27ae60; }
    .pi-card.degraded { border-left: 3px solid #e67e22; }
    .pi-card.offline  { border-left: 3px solid #c0392b; }

    .pi-name {
      font-size: 0.88rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 2px;
    }
    .pi-ip {
      font-size: 0.72rem;
      color: #6a8aaa;
      font-family: 'Consolas', monospace;
      margin-bottom: 10px;
    }
    .pi-checks {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .check-badge {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.7rem;
      color: #aaa;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.ok      { background: #27ae60; box-shadow: 0 0 4px #27ae6088; }
    .dot.fail    { background: #c0392b; box-shadow: 0 0 4px #c0392b88; }
    .dot.warn    { background: #e67e22; box-shadow: 0 0 4px #e67e2288; }
    .dot.unknown { background: #555; }

    /* service text badge */
    .svc-badge {
      font-size: 0.65rem;
      padding: 1px 5px;
      border-radius: 3px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .svc-active   { background: #1a4a2a; color: #5dca80; }
    .svc-inactive { background: #3a2a10; color: #d4a04a; }
    .svc-failed   { background: #4a1a1a; color: #e07070; }
    .svc-unknown  { background: #2a2a2a; color: #888; }

    /* ================================================================
       CAMERA GRID
    ================================================================ */
    #camera-section {
      padding: 0 28px;
    }

    .sheet-row {
      display: grid;
      grid-template-columns: 60px 1fr 1fr;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .sheet-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: #5b9bd5;
      text-align: right;
      padding-right: 8px;
      white-space: nowrap;
    }
    .cam-cell {
      background: #1a2535;
      border: 1px solid #253545;
      border-radius: 5px;
      padding: 7px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .cam-cell.up   { border-left: 3px solid #27ae60; }
    .cam-cell.down { border-left: 3px solid #c0392b; }

    .cam-end {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #7a9ab8;
      width: 34px;
      flex-shrink: 0;
    }
    .cam-ip {
      font-size: 0.72rem;
      color: #6a8aaa;
      font-family: 'Consolas', monospace;
      flex: 1;
    }
    .cam-status {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .cam-status.up   { color: #27ae60; }
    .cam-status.down { color: #c0392b; }

    /* ---- camera header row ---- */
    .cam-header {
      display: grid;
      grid-template-columns: 60px 1fr 1fr;
      gap: 8px;
      margin-bottom: 4px;
      padding: 0;
    }
    .cam-header-cell {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #3a6080;
      padding-left: 13px;
    }

    /* ---- summary bar ---- */
    #summary-bar {
      display: flex;
      gap: 24px;
      padding: 14px 28px 0;
      flex-wrap: wrap;
    }
    .summary-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .summary-count {
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1;
    }
    .summary-count.ok   { color: #27ae60; }
    .summary-count.warn { color: #e67e22; }
    .summary-count.fail { color: #c0392b; }
    .summary-label {
      font-size: 0.7rem;
      color: #7a9ab8;
      line-height: 1.3;
    }
  </style>
</head>
<body>

  <header>
    <div>
      <h1>KCC Pi Kiosk &nbsp;<span>Status Dashboard</span></h1>
      <div style="font-size:0.72rem;color:#5a7a9a;margin-top:3px;">Kelowna Curling Club</div>
    </div>
    <div style="text-align:right;">
      <div id="last-updated">Waiting for data...</div>
      <div id="refresh-countdown">Refreshing in 30s</div>
    </div>
  </header>

  <div id="error-banner"></div>

  <!-- summary -->
  <div id="summary-bar"></div>

  <!-- Pi section -->
  <div class="section-title">Raspberry Pi Fleet</div>
  <div id="pi-grid"></div>

  <!-- Camera section -->
  <div class="section-title">Camera Feeds</div>
  <div id="camera-section"></div>

  <script>
    const STATUS_FILE  = 'status.json';
    const REFRESH_SECS = 30;

    let countdown = REFRESH_SECS;

    // ----------------------------------------------------------------
    // fetch and render
    // ----------------------------------------------------------------
    async function fetchStatus() {
      try {
        const res  = await fetch(STATUS_FILE + '?t=' + Date.now());
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        hideError();
        renderAll(data);
      } catch (e) {
        showError('Could not load status.json — make sure kiosk-monitor.ps1 is running in the same folder. (' + e.message + ')');
      }
    }

    // ----------------------------------------------------------------
    // render everything
    // ----------------------------------------------------------------
    function renderAll(data) {
      document.getElementById('last-updated').textContent = 'Updated: ' + data.updated;
      renderSummary(data);
      renderPis(data.pis);
      renderCameras(data.cameras);
    }

    // ----------------------------------------------------------------
    // summary bar
    // ----------------------------------------------------------------
    function renderSummary(data) {
      const pisOk      = data.pis.filter(p => p.ping && p.ssh).length;
      const pisTotal   = data.pis.length;
      const pisFail    = pisTotal - pisOk;
      const svcActive  = data.pis.filter(p => p.service === 'active').length;
      const camsUp     = data.cameras.filter(c => c.up).length;
      const camsTotal  = data.cameras.length;
      const camsFail   = camsTotal - camsUp;

      const bar = document.getElementById('summary-bar');
      bar.innerHTML = `
        <div class="summary-item">
          <div class="summary-count ${pisFail === 0 ? 'ok' : 'fail'}">${pisOk}/${pisTotal}</div>
          <div class="summary-label">Pis<br>online</div>
        </div>
        <div class="summary-item">
          <div class="summary-count ${svcActive === pisTotal ? 'ok' : 'warn'}">${svcActive}/${pisTotal}</div>
          <div class="summary-label">Kiosk<br>service active</div>
        </div>
        <div class="summary-item">
          <div class="summary-count ${camsFail === 0 ? 'ok' : 'fail'}">${camsUp}/${camsTotal}</div>
          <div class="summary-label">Cameras<br>reachable</div>
        </div>
      `;
    }

    // ----------------------------------------------------------------
    // Pi grid
    // ----------------------------------------------------------------
    function renderPis(pis) {
      const grid = document.getElementById('pi-grid');
      grid.innerHTML = '';
      pis.forEach(pi => {
        const cardClass = !pi.ping ? 'offline' : (pi.service !== 'active' ? 'degraded' : 'all-ok');
        const pingDot   = dot(pi.ping);
        const sshDot    = dot(pi.ssh);
        const svcBadge  = serviceBadge(pi.service);

        const card = document.createElement('div');
        card.className = `pi-card ${cardClass}`;
        card.innerHTML = `
          <div class="pi-name">${pi.name}</div>
          <div class="pi-ip">${pi.ip}</div>
          <div class="pi-checks">
            <div class="check-badge">${pingDot} Ping</div>
            <div class="check-badge">${sshDot} SSH</div>
            <div class="check-badge">${svcBadge}</div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    // ----------------------------------------------------------------
    // camera grid — one row per sheet, Away | Home columns
    // ----------------------------------------------------------------
    function renderCameras(cameras) {
      const section = document.getElementById('camera-section');
      section.innerHTML = '';

      // group by sheet
      const sheets = {};
      cameras.forEach(c => {
        if (!sheets[c.sheet]) sheets[c.sheet] = {};
        sheets[c.sheet][c.end] = c;
      });

      // header
      const hdr = document.createElement('div');
      hdr.className = 'cam-header';
      hdr.innerHTML = `<div></div><div class="cam-header-cell">Away End</div><div class="cam-header-cell">Home End</div>`;
      section.appendChild(hdr);

      const sheetNums = Object.keys(sheets).map(Number).sort((a,b) => a-b);
      sheetNums.forEach(sheetNum => {
        const away = sheets[sheetNum]['Away'];
        const home = sheets[sheetNum]['Home'];

        const row = document.createElement('div');
        row.className = 'sheet-row';
        row.innerHTML = `
          <div class="sheet-label">Sheet ${sheetNum}</div>
          ${camCell(away)}
          ${camCell(home)}
        `;
        section.appendChild(row);
      });
    }

    function camCell(cam) {
      if (!cam) return `<div class="cam-cell"><span class="cam-ip">—</span></div>`;
      const cls    = cam.up ? 'up' : 'down';
      const status = cam.up ? 'UP' : 'DOWN';
      return `
        <div class="cam-cell ${cls}">
          <span class="cam-end">${cam.end}</span>
          <span class="cam-ip">${cam.ip}</span>
          <span class="cam-status ${cls}">${status}</span>
        </div>`;
    }

    // ----------------------------------------------------------------
    // helpers
    // ----------------------------------------------------------------
    function dot(ok) {
      return `<span class="dot ${ok ? 'ok' : 'fail'}"></span>`;
    }

    function serviceBadge(svc) {
      const cls = {active:'active', inactive:'inactive', failed:'failed'}[svc] || 'unknown';
      return `<span class="svc-badge svc-${cls}">${svc}</span>`;
    }

    function showError(msg) {
      const b = document.getElementById('error-banner');
      b.textContent = msg;
      b.style.display = 'block';
    }
    function hideError() {
      document.getElementById('error-banner').style.display = 'none';
    }

    // ----------------------------------------------------------------
    // countdown + auto-refresh
    // ----------------------------------------------------------------
    function tick() {
      countdown--;
      document.getElementById('refresh-countdown').textContent =
        countdown > 0 ? `Refreshing in ${countdown}s` : 'Refreshing...';
      if (countdown <= 0) {
        countdown = REFRESH_SECS;
        fetchStatus();
      }
    }

    // initial load
    fetchStatus();
    setInterval(tick, 1000);
  </script>
</body>
</html>
